<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis II Launch - Telemetría AROW VR</title>
    <!-- A-Frame (Versión estable) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <!-- Módulos del Proyecto -->
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/api-service.js"></script>
    <script src="js/telemetry-component.js"></script>
</head>
<body>

    <!-- Panel UI (HUD) -->
    <div id="ui-container">
        <h2>🚀 Artemis II - AROW</h2>
        <div class="data-row"><span>Dist. a la Tierra:</span> <span class="data-value"><span id="dist-earth">---</span> km</span></div>
        <div class="data-row"><span>Dist. a la Luna:</span> <span class="data-value"><span id="dist-moon">---</span> km</span></div>
        <div class="data-row"><span>Velocidad (Rel):</span> <span class="data-value"><span id="speed">---</span> km/h</span></div>
        <hr style="border-color: #0055ff; margin: 10px 0;">
        <div class="data-row"><span>Estado Link:</span> <span class="data-value" id="data-status">Conectando...</span></div>
        <div class="data-row"><span>Tasa Extracción:</span> <span class="data-value" id="ping-rate">---</span></div>
    </div>

    <!-- Instrucciones de Navegación -->
    <div id="instructions">
        <strong>NAVEGACIÓN VR/PC:</strong> Mantén Click Izquierdo para orientar la vista | Usa <strong>W A S D</strong> para desplazarte libremente en 3D.
    </div>

    <!-- Escena A-Frame -->
    <!-- artemis-tracker inicia la conexión AROW y gestiona la nave -->
    <a-scene artemis-tracker="scaleFactor: 100000; updateInterval: 2000" background="color: #000000">
        
        <a-assets>
            <img id="earth-map" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Land_ocean_ice_2048.jpg/1024px-Land_ocean_ice_2048.jpg" crossorigin="anonymous">
            <img id="moon-map" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Moonmap_from_clementine_data.png/1024px-Moonmap_from_clementine_data.png" crossorigin="anonymous">
        </a-assets>

        <!-- Iluminación Realista -->
        <a-light type="directional" color="#ffffff" intensity="1.8" position="-10 2 0"></a-light>
        <a-light type="ambient" color="#111111"></a-light>

        <!-- TIERRA: Diámetro real 12,756.27 km -> VR Radio: 0.06378 m -->
        <a-sphere id="earth-sphere" position="0 0 0" radius="0.06378" src="#earth-map" 
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 86400; easing: linear">
        </a-sphere>

        <!-- LUNA: Diámetro real 3,474.8 km -> VR Radio: 0.01737 m | Distancia 384,400 km -> VR Pos: X=3.844 m -->
        <a-sphere id="moon-sphere" position="3.844 0 0" radius="0.01737" src="#moon-map"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2332800; easing: linear">
        </a-sphere>

        <!-- NAVE ORION (Controlada por el script artemis-tracker) -->
        <!-- Se dimensiona un poco más grande de la escala real para que el ojo humano pueda verla -->
        <a-entity id="orion-ship" position="0.1 0 0">
            <a-cone color="#silver" radius-bottom="0.005" height="0.01" rotation="-90 0 0"></a-cone>
            <a-cylinder color="#0055ff" radius="0.006" height="0.002" position="0 0 0.005"></a-cylinder>
            <a-light type="point" color="#00ffcc" intensity="0.5" distance="0.2"></a-light>
        </a-entity>

        <!-- CÁMARA (Vuelo 3D activado) -->
        <!-- 'fly: true' rompe el eje Y, permitiendo navegar como astronauta -->
        <a-entity camera look-controls="pointerLockEnabled: false" 
                  wasd-controls="fly: true; acceleration: 0.3" 
                  position="-0.2 0.1 0.3">
        </a-entity>

    </a-scene>
</body>
</html>
