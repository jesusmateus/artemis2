<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis II Launch - Telemetría AROW VR</title>
    
    <!-- 1. DEPENDENCIA PRINCIPAL (Debe cargar primero y bloquear el parseo hasta estar lista) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <!-- 2. HOJA DE ESTILOS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- 3. MÓDULOS DEL PROYECTO (En estricto orden de dependencia) -->
    <!-- blender-controls y telemetry dependen de AFRAME (ya cargado arriba) -->
    <script src="js/blender-controls.js"></script>
    <!-- api-service no depende de A-Frame, pero telemetry-component depende de api-service -->
    <script src="js/api-service.js"></script>
    <script src="js/telemetry-component.js"></script>
    <script>
        // disable right click
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function (e) {            
            if(e.keyCode == 123) {
                return false;
            }// disable F12 key            
            if(e.ctrlKey && e.shiftKey && e.keyCode == 73){
                return false;
            }// disable I key            
            if(e.ctrlKey && e.shiftKey && e.keyCode == 74) {
                return false;
            }// disable J key       
            if(e.ctrlKey && e.keyCode == 85) {
                return false;
            }// disable U key
        }
    </script>
</head>
<body>

    <!-- Panel UI (HUD) -->
    <div id="ui-container">
        <h2>🚀 Artemis II - AROW</h2>
        <div class="data-row"><span>Dist. from Earth:</span> <span class="data-value"><span id="dist-earth">---</span> km</span></div>
        <div class="data-row"><span>Dist. from Moon:</span> <span class="data-value"><span id="dist-moon">---</span> km</span></div>
        <div class="data-row"><span>Speed (Rel):</span> <span class="data-value"><span id="speed">---</span> km/h</span></div>
        <hr style="border-color: #0055ff; margin: 10px 0;">
        <div class="data-row"><span>Link Status:</span> <span class="data-value" id="data-status">Conecting...</span></div>
        <div class="data-row"><span>Extraction Rate:</span> <span class="data-value" id="ping-rate">---</span></div>
    </div>

    <!-- Instrucciones de Navegación -->
    <div id="instructions">
        <strong>VR/PC NAVIGATION:</strong> Hold Left Click to aim | <strong>WASD:</strong> to move | Click on planet to select | <strong>ORBIT:</strong> scroll click
    </div>

    <!-- ESCENA A-FRAME -->
    <!-- Se inician los componentes registrados en el <head> -->
    <a-scene artemis-tracker="scaleFactor: 100000; updateInterval: 2000" 
             blender-controls 
             starfield 
             cursor="rayOrigin: mouse" 
             raycaster="objects: .clickable" 
             background="color: #000000">
        
        <a-assets>
            <!-- Asegúrate de tener los archivos .glb en una carpeta llamada 'assets' junto a tu index.html -->
            <a-asset-item id="earth-model" src="assets/tierra.gltf"></a-asset-item>
            <a-asset-item id="moon-model" src="assets/luna.gltf"></a-asset-item>
            <a-asset-item id="orion-model" src="assets/orion.glb"></a-asset-item>

            <img id="a2_alert_01" src="/assets/a2_alert_01.png">
            <img id="a2_alert_02" src="/assets/a2_alert_02.png">
        </a-assets>

        <!-- EL SOL (Iluminación y representación) -->
        <a-entity id="sun" position="-500 0 -500">
            <a-sphere radius="10" material="color: #ffffee; shader: flat;"></a-sphere>
            <a-light type="point" color="#ffffff" intensity="3" distance="2000" decay="0"></a-light>
        </a-entity>
        <!-- Luz ambiental tenue para ver la parte oscura de los planetas -->
        <a-light type="ambient" color="#0a0a1a" intensity="0.5"></a-light>

        <!-- LA TIERRA (.glb + Inclinación Orbital + Raycaster) -->
        <!-- La clase 'clickable' permite que el raycaster la detecte para usar Numpad (.) y Alt+Click -->
        <a-entity id="earth-container" position="-0.03 0 0" rotation="23.5 0 0">
            <!-- HITBOX: Esfera transparente matemáticamente perfecta para el clic -->
            <a-sphere id="hitbox-earth" class="clickable" data-name="TIERRA" radius="0.08" material="opacity: 0; transparent: true; depthWrite: false;"></a-sphere>
            
            <a-entity gltf-model="#earth-model" scale="0.12756 0.12756 0.12756" 
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 864000; easing: linear">
            </a-entity>

            <!-- LETRERO DINÁMICO (Crece y decrece según la distancia) -->
            <a-entity dynamic-label="text: EARTH; baseScale: 0.1" position="0 0.12 0"></a-entity>
        </a-entity>

        <!-- LA LUNA (.glb + Hitbox + Letrero Dinámico) -->
        <a-entity id="moon-container" position="3.844 0 0" rotation="1.54 0 0">
            <!-- HITBOX LUNA -->
            <a-sphere id="hitbox-moon" class="clickable" data-name="LUNA" radius="0.025" material="opacity: 0; transparent: true; depthWrite: false;"></a-sphere>
            
            <a-entity gltf-model="#moon-model" scale="0.03474 0.03474 0.03474"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 2332800; easing: linear">
            </a-entity>

            <!-- LETRERO DINÁMICO LUNA -->
            <a-entity dynamic-label="text: MOON; baseScale: 0.1" position="0 0.05 0"></a-entity>
        </a-entity>

        <!-- NAVE ORION (+ Hitbox + Letrero) -->
        <a-entity id="orion-ship" position="0.1 0 0">
            <!-- HITBOX NAVE -->
            <a-sphere id="hitbox-orion" class="clickable" data-name="ORION" radius="0.02" material="opacity: 0; transparent: true; depthWrite: false;"></a-sphere>
            
            <a-entity gltf-model="#orion-model" scale="0.005 0.005 0.005"></a-entity>
            
            <!-- LETRERO DINÁMICO NAVE -->
            <a-entity dynamic-label="text: ORION; baseScale: 0.05" position="0 0.03 0"></a-entity>
        </a-entity>
        
            <!-- Alerta e instrucciones -->
        <a-entity>
            <a-image src="#a2_alert_01" scale="1.8 1.5 1.8" position="0 -1.5 3 " rotation="270 0 0"></a-image>
            <a-image src="#a2_alert_02" scale="1.5 1.8 1.8" position="1.5 -.45 3" rotation="0 270 0"></a-image>
        </a-entity>

        <!-- CÁMARA VR / NAVEGACIÓN -->
        <a-entity id="rig" position="0 -1.5 3">
            <a-camera id="camera" look-controls="pointerLockEnabled: false" wasd-controls="fly: true; acceleration: 15"></a-camera>
        </a-entity>

    </a-scene>
</body>
</html>
